<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="favicon" href="connection.png">
    <title>ViblySpace Code Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #4361ee;
            --secondary: #7209b7;
            --dark: #1a1a2e;
            --light: #f8f9fa;
        }

        body {
            background-color: var(--dark);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-bottom: 2px solid var(--primary);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            color: var(--primary);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-success {
            background: #2ecc71;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Editor Side */
        .editor-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            background: transparent;
            color: #aaa;
            border: none;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border-bottom-color: var(--primary);
        }

        .tab i {
            margin-right: 8px;
        }

        .editor-container {
            flex: 1;
            position: relative;
        }

        .code-editor {
            width: 100%;
            height: 100%;
            background: #2d3748;
            color: #e2e8f0;
            padding: 20px;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        .editor-footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            font-size: 12px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        /* Preview Side */
        .preview-side {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-container {
            flex: 1;
            background: white;
            position: relative;
            overflow: hidden;
        }

        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .preview-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            color: #666;
            text-align: center;
            padding: 20px;
        }

        .preview-placeholder i {
            font-size: 48px;
            color: #ccc;
            margin-bottom: 20px;
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2ecc71;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Status Bar */
        .status-bar {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            font-size: 12px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        /* Console */
        .console {
            height: 200px;
            background: #1e1e1e;
            border-top: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            padding: 10px 15px;
            background: #252526;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-output {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #ccc;
        }

        .log {
            margin-bottom: 5px;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }

        .log.info {
            color: #3794ff;
        }

        .log.error {
            color: #f14c4c;
            background: rgba(241, 76, 76, 0.1);
        }

        .log.warn {
            color: #cca700;
        }

        .log.success {
            color: #2ecc71;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .editor-side {
                height: 50%;
            }
            
            .preview-side {
                height: 50%;
                border-top: 2px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>

                    <textarea class="code-editor" id="js-editor" spellcheck="false" style="display: none;">// ViblySpace Interactive JavaScript
document.addEventListener('DOMContentLoaded', function() {
    console.log('ViblySpace app loaded successfully!');
    
    // Get elements
    const demoBtn = document.getElementById('demo-btn');
    const clickCounter = document.getElementById('click-counter');
    const colorButtons = document.querySelectorAll('.color-btn');
    const currentTime = document.getElementById('current-time');
    const updateTimeBtn = document.getElementById('update-time');
    
    // Click counter
    let clickCount = 0;
    
    if (demoBtn) {
        demoBtn.addEventListener('click', function() {
            clickCount++;
            clickCounter.textContent = 'Clicks: ' + clickCount;
            
            // Change button color randomly
            const colors = ['#4361ee', '#f72585', '#4cc9f0', '#2a9d8f', '#e9c46a'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const nextColor = colors[(colors.indexOf(randomColor) + 1) % colors.length];
            demoBtn.style.background = 'linear-gradient(90deg, ' + randomColor + ', ' + nextColor + ')';
            
            // Add animation
            demoBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                demoBtn.style.transform = 'scale(1)';
            }, 150);
            
            console.log('Button clicked ' + clickCount + ' times!');
            
            // Show message every 5 clicks
            if (clickCount % 5 === 0) {
                const messages = [
                    "Great! Keep going!",
                    "Awesome! You're learning!",
                    "Excellent work!",
                    "Fantastic! Try editing the code!",
                    "Amazing! You're a coding pro!"
                ];
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                console.info('🎉 ' + randomMsg);
            }
        });
    }
    
    // Color buttons
    colorButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            const color = this.getAttribute('data-color');
            document.body.style.background = 'linear-gradient(135deg, ' + color + ' 0%, #764ba2 100%)';
            console.log('Changed background to ' + color);
        });
    });
    
    // Time functionality
    function updateTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString();
        const dateString = now.toLocaleDateString();
        currentTime.textContent = timeString + ' • ' + dateString;
    }
    
    if (updateTimeBtn) {
        updateTimeBtn.addEventListener('click', updateTime);
        
        // Update time every second
        setInterval(updateTime, 1000);
    }
    
    // Initial time update
    updateTime();
    
    // Add hover effects to cards
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        card.addEventListener('mouseenter', function() {
            this.style.boxShadow = '0 10px 25px rgba(0,0,0,0.2)';
        });
        
        card.addEventListener('mouseleave', function() {
            this.style.boxShadow = '0 5px 15px rgba(0,0,0,0.1)';
        });
    });
    
    // Initial console messages
    console.info('✨ Welcome to ViblySpace Code Editor!');
    console.info('💡 Try editing the code in different tabs');
    console.info('🚀 Click "Run Code" to see your changes live');
});</textarea>

    <script>
        // ====== DOM ELEMENTS ======
        const htmlEditor = document.getElementById('html-editor');
        const cssEditor = document.getElementById('css-editor');
        const jsEditor = document.getElementById('js-editor');
        const tabs = document.querySelectorAll('.tab');
        const runBtn = document.getElementById('run-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const resetBtn = document.getElementById('reset-btn');
        const autoRunToggle = document.getElementById('auto-run');
        const previewFrame = document.getElementById('preview-frame');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const fileInfo = document.getElementById('file-info');
        const charCount = document.getElementById('char-count');
        const statusText = document.getElementById('status-text');
        const consoleOutput = document.getElementById('console-output');
        const clearConsoleBtn = document.getElementById('clear-console-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const consoleStatus = document.getElementById('console-status');
        
        // ====== STATE VARIABLES ======
        let currentTab = 'html';
        let isAutoRun = false;
        let autoRunTimeout = null;
        
        // ====== INITIALIZATION ======
        function init() {
            console.log('🚀 ViblySpace Code Editor Initializing...');
            
            // Set up all event listeners
            setupEventListeners();
            
            // Update character count
            updateCharCount();
            
            // Run code on initial load
            setTimeout(() => {
                runCode();
            }, 1000);
            
            addConsoleLog('Editor initialized successfully!', 'success');
            updateStatus('Ready to code!');
        }

        // ====== EVENT LISTENERS ======
        function setupEventListeners() {
            // Tab switching
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabName = this.dataset.tab;
                    switchTab(tabName);
                });
            });

            // Run button
            runBtn.addEventListener('click', runCode);
            
            // Refresh button
            refreshBtn.addEventListener('click', runCode);
            
            // Reset button
            resetBtn.addEventListener('click', function() {
                if (confirm('Reset all code to default? This will erase your changes.')) {
                    htmlEditor.value = htmlEditor.defaultValue;
                    cssEditor.value = cssEditor.defaultValue;
                    jsEditor.value = jsEditor.defaultValue;
                    
                    updateCharCount();
                    updateStatus('All editors reset to default');
                    addConsoleLog('Code reset to default', 'success');
                    
                    // Run the default code
                    runCode();
                }
            });
            
            // Auto-run toggle
            autoRunToggle.addEventListener('change', function() {
                isAutoRun = this.checked;
                updateStatus(isAutoRun ? 'Auto-run enabled' : 'Auto-run disabled');
                addConsoleLog('Auto-run ' + (isAutoRun ? 'enabled' : 'disabled'), 'info');
            });
            
            // Editor input for auto-run
            [htmlEditor, cssEditor, jsEditor].forEach(editor => {
                editor.addEventListener('input', function() {
                    updateCharCount();
                    
                    // Auto-run with debounce
                    if (isAutoRun) {
                        clearTimeout(autoRunTimeout);
                        autoRunTimeout = setTimeout(runCode, 1000);
                    }
                });
            });
            
            // Clear console
            clearConsoleBtn.addEventListener('click', function() {
                consoleOutput.innerHTML = '';
                addConsoleLog('Console cleared', 'info');
            });
            
            // Fullscreen button
            fullscreenBtn.addEventListener('click', function() {
                const previewContainer = document.querySelector('.preview-container');
                
                if (!document.fullscreenElement) {
                    if (previewContainer.requestFullscreen) {
                        previewContainer.requestFullscreen();
                    } else if (previewContainer.webkitRequestFullscreen) {
                        previewContainer.webkitRequestFullscreen();
                    } else if (previewContainer.msRequestFullscreen) {
                        previewContainer.msRequestFullscreen();
                    }
                    fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i> Exit';
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> Fullscreen';
                }
            });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                // Ctrl+Enter to run code
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    runCode();
                }
            });
        }

        // ====== TAB MANAGEMENT ======
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Update active tab UI
            tabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === tabName);
            });
            
            // Show correct editor
            htmlEditor.style.display = tabName === 'html' ? 'block' : 'none';
            cssEditor.style.display = tabName === 'css' ? 'block' : 'none';
            jsEditor.style.display = tabName === 'js' ? 'block' : 'none';
            
            // Update file info
            fileInfo.textContent = tabName.toUpperCase();
            updateCharCount();
            updateStatus(`Switched to ${tabName.toUpperCase()} editor`);
        }

        // ====== RUN CODE FUNCTION (FIXED) ======
        function runCode() {
            console.log('▶️ Running code...');
            
            // Show loading state
            runBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running...';
            runBtn.disabled = true;
            consoleStatus.textContent = 'Running...';
            
            updateStatus('Running your code...');
            
            // Get current code
            const htmlCode = htmlEditor.value;
            const cssCode = cssEditor.value;
            const jsCode = jsEditor.value;
            
            // Create complete HTML document
            const fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViblySpace Preview</title>
    <style>
        ${cssCode}
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    ${htmlCode}
    <script>
        // Override console methods
        (function() {
            const originalLog = console.log;
            const originalError = console.error;
            const originalWarn = console.warn;
            const originalInfo = console.info;
            
            function sendConsoleMessage(level, args) {
                try {
                    const message = {
                        type: 'console',
                        level: level,
                        data: Array.from(args).map(arg => {
                            if (typeof arg === 'object') {
                                try {
                                    return JSON.stringify(arg);
                                } catch(e) {
                                    return String(arg);
                                }
                            }
                            return String(arg);
                        }).join(' ')
                    };
                    window.parent.postMessage(message, '*');
                } catch(e) {
                    // Parent might not be available
                }
            }
            
            console.log = function(...args) {
                sendConsoleMessage('log', args);
                originalLog.apply(console, args);
            };
            
            console.error = function(...args) {
                sendConsoleMessage('error', args);
                originalError.apply(console, args);
            };
            
            console.warn = function(...args) {
                sendConsoleMessage('warn', args);
                originalWarn.apply(console, args);
            };
            
            console.info = function(...args) {
                sendConsoleMessage('info', args);
                originalInfo.apply(console, args);
            };
            
            // Catch unhandled errors
            window.addEventListener('error', function(e) {
                sendConsoleMessage('error', ['Error:', e.message, 'at', e.filename + ':' + e.lineno]);
            });
            
            // Catch unhandled promise rejections
            window.addEventListener('unhandledrejection', function(e) {
                sendConsoleMessage('error', ['Unhandled Promise Rejection:', e.reason]);
            });
        })();
        
        // User's JavaScript code
        try {
            ${jsCode}
        } catch(error) {
            console.error('JavaScript Error:', error.message);
        }
    <\/script>
</body>
</html>`;
            
            // Create a Blob with the HTML content
            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            // Load the Blob URL into the iframe
            previewFrame.onload = function() {
                // Clean up the Blob URL
                URL.revokeObjectURL(url);
                
                // Show iframe, hide placeholder
                previewFrame.style.display = 'block';
                previewPlaceholder.style.display = 'none';
                
                // Reset button state
                setTimeout(() => {
                    runBtn.innerHTML = '<i class="fas fa-play"></i> Run Code';
                    runBtn.disabled = false;
                    consoleStatus.textContent = 'Ready';
                }, 300);
                
                updateStatus('Code executed successfully!');
                addConsoleLog('Code executed successfully!', 'success');
            };
            
            previewFrame.onerror = function() {
                addConsoleLog('Error loading preview', 'error');
                updateStatus('Error loading preview');
                
                runBtn.innerHTML = '<i class="fas fa-play"></i> Run Code';
                runBtn.disabled = false;
                consoleStatus.textContent = 'Error';
            };
            
            // Set the iframe source
            previewFrame.src = url;
        }

        // ====== CONSOLE FUNCTIONS ======
        function addConsoleLog(message, level = 'info') {
            const logDiv = document.createElement('div');
            logDiv.className = 'log ' + level;
            
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<span style="color: #666; font-size: 11px;">[${time}]</span> ${message}`;
            
            consoleOutput.appendChild(logDiv);
            
            // Auto-scroll to bottom
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        // ====== UTILITY FUNCTIONS ======
        function updateCharCount() {
            let activeEditor;
            if (currentTab === 'html') activeEditor = htmlEditor;
            else if (currentTab === 'css') activeEditor = cssEditor;
            else activeEditor = jsEditor;
            
            const charLength = activeEditor.value.length;
            charCount.textContent = `Characters: ${charLength}`;
        }

        function updateStatus(message) {
            statusText.textContent = message;
            console.log('Status:', message);
        }

        // ====== MESSAGE LISTENER FOR CONSOLE ======
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'console') {
                addConsoleLog(event.data.data, event.data.level);
            }
        });

        // ====== INITIALIZE ON PAGE LOAD ======
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
